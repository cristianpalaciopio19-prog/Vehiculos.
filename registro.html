<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Control de Vehículos{% endblock %} — SET Colombina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root{
    --bg-base:#FFFFFF; --bg-surface:#FFFFFF; --bg-surface-2:#F3F5F1; --bg-raised:#EAEDE6;
    --line:#E1E4DC; --line-soft:#EEF0EA;
    --text-primary:#1C1E1B; --text-secondary:#5B5E55; --text-tertiary:#8A8D83;
    --olive-50:#EAF3DE; --olive-100:#C0DD97; --olive-200:#7FAE3E; --olive-400:#3B6D11; --olive-600:#2F580D; --olive-800:#27500A; --olive-900:#173404;
    --terra-50:#FAECE7; --terra-100:#F5C4B3; --terra-200:#C2491F; --terra-400:#D85A30; --terra-600:#993C1D; --terra-800:#712B13; --terra-900:#4A1B0C;
    --colombina-blue:#1E3A6E;
    --radius-sm:6px; --radius-md:10px; --radius-lg:16px;
    --font-ui:'Inter',system-ui,sans-serif; --font-mono:'JetBrains Mono',monospace;
    --shadow-card: 0 1px 3px rgba(28,30,27,0.06), 0 1px 2px rgba(28,30,27,0.04);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:#F7F8F5; font-family:var(--font-ui); color:var(--text-primary); min-height:100vh; }
  .shell{ max-width:480px; margin:0 auto; min-height:100vh; background:var(--bg-base); display:flex; flex-direction:column; position:relative; box-shadow:var(--shadow-card); }
  .topbar{ padding:20px 20px 16px; flex-shrink:0; display:flex; align-items:center; gap:12px; }
  .topbar-logo{ height:34px; width:auto; flex-shrink:0; }
  .topbar-text{ flex:1; min-width:0; }
  .eyebrow{ font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--olive-400); margin-bottom:4px; }
  .pagetitle{ font-size:22px; font-weight:800; letter-spacing:-0.01em; color:var(--text-primary); }
  .content{ padding:0 20px 110px; flex:1; }
  .plate{ display:inline-flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:700; font-size:13px; letter-spacing:0.04em; background:var(--text-primary); color:#FFFFFF; border-radius:5px; padding:4px 8px; border-bottom:3px solid var(--olive-400); line-height:1; }
  .plate.alert{ border-bottom-color:var(--terra-400); }
  .navbar{ position:sticky; bottom:0; left:0; right:0; height:78px; background:var(--bg-surface); border-top:1px solid var(--line); display:flex; align-items:center; justify-content:space-around; padding-bottom:14px; z-index:5; max-width:480px; margin:0 auto; width:100%; }
  .navitem{ display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; color:var(--text-tertiary); font-family:var(--font-ui); font-size:10.5px; font-weight:600; cursor:pointer; width:64px; padding:6px 0 0; text-decoration:none; }
  .navitem.active{ color:var(--olive-400); }
  .navitem i{ font-size:21px; }
  .card{ background:var(--bg-surface); border:1px solid var(--line-soft); border-radius:var(--radius-lg); padding:16px; margin-bottom:12px; box-shadow:var(--shadow-card); }
  .card.tappable{ cursor:pointer; transition:background .15s, box-shadow .15s; text-decoration:none; color:inherit; display:block; }
  .card.tappable:hover{ background:var(--bg-surface-2); }
  .card.alert{ border-color:var(--terra-200); border-left:3px solid var(--terra-400); border-radius:0 var(--radius-lg) var(--radius-lg) 0; }
  .stat-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .stat{ background:var(--bg-surface); border:1px solid var(--line-soft); border-radius:var(--radius-md); padding:14px; box-shadow:var(--shadow-card); }
  .stat .label{ font-size:11.5px; color:var(--text-secondary); font-weight:600; margin-bottom:6px; }
  .stat .value{ font-family:var(--font-mono); font-size:21px; font-weight:700; color:var(--text-primary); }
  .stat .unit{ font-size:12px; color:var(--text-tertiary); font-weight:500; margin-left:2px;}
  .section-label{ font-size:12px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:var(--text-tertiary); margin:18px 0 10px; }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .route-tag{ font-family:var(--font-mono); font-size:11px; font-weight:700; background:var(--olive-50); color:var(--olive-600); border-radius:5px; padding:3px 7px; white-space:nowrap; }
  .route-tag.adm{ background:var(--bg-raised); color:var(--text-secondary); }
  .btn-primary{ background:var(--olive-400); color:#FFFFFF; border:none; font-family:var(--font-ui); font-weight:700; font-size:15px; border-radius:var(--radius-md); padding:15px; width:100%; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-primary:active{ transform:scale(0.98); }
  .btn-secondary{ background:var(--bg-surface-2); color:var(--text-primary); border:1px solid var(--line); font-family:var(--font-ui); font-weight:600; font-size:14px; border-radius:var(--radius-md); padding:13px; width:100%; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:7px; }
  .btn-danger-link{ background:none; border:none; color:var(--terra-200); font-size:13px; font-weight:600; cursor:pointer; }
  label.field-label{ display:block; font-size:12.5px; font-weight:600; color:var(--text-secondary); margin-bottom:7px; margin-top:16px; }
  .input, select.input{ width:100%; background:var(--bg-surface); border:1px solid var(--line); color:var(--text-primary); font-family:var(--font-ui); font-size:15px; border-radius:var(--radius-md); padding:13px 14px; outline:none; }
  .input:focus, select.input:focus{ border-color:var(--olive-400); }
  .input.mono{ font-family:var(--font-mono); font-weight:600; letter-spacing:0.03em; }
  .input[readonly]{ background:var(--bg-surface-2); color:var(--text-secondary); }
  .chip-group{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{ font-family:var(--font-mono); font-size:13px; font-weight:600; padding:9px 13px; border-radius:var(--radius-sm); border:1px solid var(--line); background:var(--bg-surface); color:var(--text-secondary); cursor:pointer; }
  .chip.selected{ background:var(--olive-50); border-color:var(--olive-400); color:var(--olive-600); }
  .factor-badge{ font-family:var(--font-mono); font-weight:700; font-size:11px; padding:2px 6px; border-radius:4px; white-space:nowrap; }
  .factor-2{ background:var(--olive-50); color:var(--olive-600); }
  .factor-1{ background:var(--bg-raised); color:var(--text-secondary); }
  .empty-state{ text-align:center; padding:60px 24px; }
  .empty-state i{ font-size:38px; color:var(--text-tertiary); margin-bottom:14px; display:block; }
  .empty-state p{ color:var(--text-secondary); font-size:14px; line-height:1.5; }
  .back-btn{ background:none; border:none; color:var(--text-secondary); display:flex; align-items:center; gap:6px; font-size:14px; font-weight:600; cursor:pointer; padding:4px 0 0; text-decoration:none; width:fit-content; }
  .flash{ padding:12px 14px; border-radius:var(--radius-md); font-size:13.5px; margin-bottom:14px; font-weight:500; }
  .flash.success{ background:var(--olive-50); color:var(--olive-600); }
  .flash.error{ background:var(--terra-50); color:var(--terra-600); }
  .dropzone{ border:1.5px dashed var(--line); border-radius:var(--radius-lg); padding:36px 20px; text-align:center; margin-top:6px; cursor:pointer; }
  .dropzone i{ font-size:32px; color:var(--text-tertiary); margin-bottom:10px; display:block;}
  .dropzone p{ font-size:13.5px; color:var(--text-secondary); }
  .dropzone .hint{ font-size:12px; color:var(--text-tertiary); margin-top:4px; }
  .fab{ position:fixed; right:calc(50% - 240px + 20px); bottom:96px; width:54px; height:54px; border-radius:50%; background:var(--olive-400); color:#FFFFFF; border:none; display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 6px 16px rgba(28,30,27,0.25); cursor:pointer; z-index:6; text-decoration:none; }
  @media (max-width:480px){ .fab{ right:20px; } }
  table.viaje-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.viaje-table th{ text-align:left; padding:8px 6px; color:var(--text-tertiary); font-weight:600; border-bottom:1px solid var(--line); font-size:11px; text-transform:uppercase; letter-spacing:0.03em; }
  table.viaje-table td{ padding:8px 6px; border-bottom:1px solid var(--line-soft); }
  .checkbox-row{ display:flex; align-items:flex-start; gap:10px; }
  .checkbox-row input[type=checkbox]{ width:18px; height:18px; margin-top:2px; accent-color:var(--olive-400); }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <img src="{{ url_for('static', filename='colombina-logo.png') }}" alt="Colombina" class="topbar-logo">
    <div class="topbar-text">
      <div class="pagetitle">{% block heading %}{% endblock %}</div>
    </div>
  </div>
  <div class="content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  {% block fab %}{% endblock %}
  <div class="navbar">
    <a href="{{ url_for('inicio') }}" class="navitem {{ 'active' if active=='inicio' else '' }}"><i class="ti ti-home"></i><span>Inicio</span></a>
    <a href="{{ url_for('registro') }}" class="navitem {{ 'active' if active=='registro' else '' }}"><i class="ti ti-square-plus"></i><span>Registrar</span></a>
    <a href="{{ url_for('lista_viajes') }}" class="navitem {{ 'active' if active=='viajes' else '' }}"><i class="ti ti-list"></i><span>Viajes</span></a>
  </div>
</div>
</body>
</html>
