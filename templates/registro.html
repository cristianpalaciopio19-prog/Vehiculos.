{% extends "base.html" %}
{% set active = 'registro' %}
{% block heading %}Registrar viaje{% endblock %}
{% block content %}
<form action="{{ url_for('registro') }}" method="post" id="form-registro">
  <label class="field-label" style="margin-top:0;">Placa del vehículo</label>
  <input class="input mono" type="text" name="placa" id="placa-input" list="placas-list" placeholder="Ej. ESZ696" required autocomplete="off">
  <datalist id="placas-list">
    {% for p in placas %}
    <option value="{{ p }}"></option>
    {% endfor %}
  </datalist>
  <p id="placa-hint" style="font-size:11.5px; color:var(--olive-200); margin-top:6px; display:none;"></p>

  <label class="field-label">Número interno</label>
  <input class="input mono" type="text" name="numero_interno" id="numero-interno-input" placeholder="Ej. 439">

  <label class="field-label">Ruta</label>
  <select class="input" name="ruta" id="ruta-select">
    <option value="">Selecciona...</option>
    {% for r in rutas %}
    <option value="{{ r }}">{{ r }}</option>
    {% endfor %}
  </select>

  <label class="field-label">Municipio</label>
  <select class="input" name="municipio" id="municipio-select">
    <option value="">Selecciona...</option>
    {% for m in municipios %}
    <option value="{{ m }}">{{ m }}</option>
    {% endfor %}
  </select>

  <div style="display:flex; gap:10px;">
    <div style="flex:1;">
      <label class="field-label">Fecha</label>
      <input class="input" type="text" name="fecha" value="{{ fecha_hoy }}" readonly>
    </div>
    <div style="flex:1;">
      <label class="field-label">Turno</label>
      <select class="input" name="turno">
        <option value="">—</option>
        <option value="6:AM a 2:PM">6:AM a 2:PM</option>
        <option value="2:PM a 10:PM">2:PM a 10:PM</option>
        <option value="10:PM a 6:AM">10:PM a 6:AM</option>
        <option value="ADM">ADM</option>
      </select>
    </div>
  </div>

  <label class="field-label">Semana</label>
  <input class="input" type="text" name="semana" value="{{ semana_hoy }}" readonly>

  <label class="field-label">Conductor</label>
  <input class="input" type="text" name="conductor" id="conductor-input" placeholder="Nombre del conductor">

  <label class="field-label">Kilómetros recorridos</label>
  <input class="input mono" type="text" name="km" id="km-input" placeholder="Ej. 38.0" required>

  <label class="field-label">¿Ingreso o salida?</label>
  <div class="chip-group">
    <span class="chip" data-value="Ingreso">Ingreso</span>
    <span class="chip" data-value="Salida">Salida</span>
    <span class="chip" data-value="">No aplica</span>
  </div>
  <input type="hidden" name="lleva_trae_personal" id="lleva-trae-hidden">

  <label class="field-label">Quién diligencia</label>
  <input class="input" type="text" name="quien_diligencia" placeholder="Tu nombre">

  <button type="submit" class="btn-primary" style="margin-top:18px;"><i class="ti ti-check"></i> Guardar viaje</button>
</form>

<script>
  const placaInput = document.getElementById('placa-input');
  const placaHint = document.getElementById('placa-hint');
  const numeroInternoInput = document.getElementById('numero-interno-input');
  const rutaSelect = document.getElementById('ruta-select');
  const municipioSelect = document.getElementById('municipio-select');
  const conductorInput = document.getElementById('conductor-input');
  const kmInput = document.getElementById('km-input');

  let ultimaPlacaBuscada = '';

  async function autocompletar() {
    const placa = placaInput.value.trim().toUpperCase();
    if (placa.length < 5 || placa === ultimaPlacaBuscada) return;
    ultimaPlacaBuscada = placa;
    try {
      const resp = await fetch(`/api/datos-placa/${placa}`);
      const datos = await resp.json();
      if (datos.conductor || datos.ruta) {
        if (datos.numero_interno && !numeroInternoInput.value) numeroInternoInput.value = datos.numero_interno;
        if (datos.ruta) rutaSelect.value = datos.ruta;
        if (datos.municipio) municipioSelect.value = datos.municipio;
        if (datos.conductor && !conductorInput.value) conductorInput.value = datos.conductor;
        if (datos.km && !kmInput.value) kmInput.value = datos.km;
        placaHint.textContent = 'Datos habituales cargados automáticamente — puedes editarlos si este viaje es distinto.';
        placaHint.style.display = 'block';
      } else {
        placaHint.style.display = 'none';
      }
    } catch (e) { /* silencioso */ }
  }

  placaInput.addEventListener('change', autocompletar);
  placaInput.addEventListener('blur', autocompletar);

  // si cambian la ruta manualmente, ofrecer el km oficial si el campo está vacío
  rutaSelect.addEventListener('change', async () => {
    if (kmInput.value) return;
    try {
      const resp = await fetch(`/api/km-ruta/${encodeURIComponent(rutaSelect.value)}`);
      const datos = await resp.json();
      if (datos.km) kmInput.value = datos.km;
    } catch (e) { /* silencioso */ }
  });

  const chips = document.querySelectorAll('.chip-group .chip');
  const hiddenLT = document.getElementById('lleva-trae-hidden');
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      hiddenLT.value = chip.dataset.value;
    });
  });
</script>
{% endblock %}
