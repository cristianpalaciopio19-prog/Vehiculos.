{% extends "base.html" %}
{% set active = 'registro' %}
{% block heading %}Registrar viaje{% endblock %}
{% block content %}
<form action="{{ url_for('registro') }}" method="post" id="form-registro">
  <label class="field-label" style="margin-top:0;">Placa del vehículo</label>
  <input class="input mono" type="text" name="placa" placeholder="Ej. ESZ696" required>

  <label class="field-label">Ruta</label>
  <div class="chip-group" id="chip-rutas">
    {% for r in rutas %}
    <span class="chip" data-value="{{ r }}">{{ r }}</span>
    {% endfor %}
  </div>
  <input type="hidden" name="ruta" id="ruta-hidden">

  <label class="field-label">Municipio</label>
  <select class="input" name="municipio">
    <option value="">Selecciona...</option>
    {% for m in municipios %}
    <option value="{{ m }}">{{ m }}</option>
    {% endfor %}
  </select>

  <div style="display:flex; gap:10px;">
    <div style="flex:1;">
      <label class="field-label">Fecha</label>
      <input class="input" type="text" name="fecha" placeholder="dd/mm/aaaa">
    </div>
    <div style="flex:1;">
      <label class="field-label">Turno</label>
      <select class="input" name="turno">
        <option value="">—</option>
        <option value="AM">AM</option>
        <option value="PM">PM</option>
      </select>
    </div>
  </div>

  <label class="field-label">Conductor</label>
  <input class="input" type="text" name="conductor" placeholder="Nombre del conductor">

  <label class="field-label">Kilómetros recorridos</label>
  <input class="input mono" type="text" name="km" placeholder="Ej. 38.0" required>

  <div class="card" style="margin-top:18px; background:var(--bg-surface-2);" id="factor-preview" hidden>
    <div class="row">
      <span style="font-size:13px; color:var(--text-secondary); font-weight:600;">Factor de facturación</span>
      <span class="factor-badge factor-2" id="factor-badge">× 2 OPERATIVA</span>
    </div>
  </div>

  <button type="submit" class="btn-primary" style="margin-top:18px;"><i class="ti ti-check"></i> Guardar viaje</button>
</form>

<script>
  const RUTAS_ADM = new Set(["ADM Z", "ADM R", "ADM T", "MANTENIMIENTO"]);
  const chips = document.querySelectorAll('#chip-rutas .chip');
  const hidden = document.getElementById('ruta-hidden');
  const preview = document.getElementById('factor-preview');
  const badge = document.getElementById('factor-badge');

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      const val = chip.dataset.value;
      hidden.value = val;
      preview.hidden = false;
      const esAdm = RUTAS_ADM.has(val) || val.includes('ADM') || val.includes('MANTENIMIENTO');
      badge.textContent = esAdm ? '× 1 ADMINISTRATIVA' : '× 2 OPERATIVA';
      badge.className = 'factor-badge ' + (esAdm ? 'factor-1' : 'factor-2');
    });
  });
</script>
{% endblock %}
